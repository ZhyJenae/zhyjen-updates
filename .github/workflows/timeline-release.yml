name: Timeline post → release

# When a new dated file appears in docs/timeline/, this workflow creates
# a draft GitHub Release whose notes are that file. The maintainer
# reviews the draft and publishes it (one click).
#
# Convention: a "timeline post" is any file in docs/timeline/ that is
# NOT _TEMPLATE.md and matches the YYYY-MM-DD-*.md pattern. The
# version tag is taken from the file's frontmatter `version:` field
# (e.g. "v0.2.0"). The release title is the frontmatter `title:`
# field. The release notes are the file's full contents.
#
# See docs/timeline/_TEMPLATE.md for the post format.

on:
  push:
    branches: [main]
    paths:
      - "docs/timeline/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-*.md"

permissions:
  contents: write

jobs:
  draft-release:
    name: Draft release from new timeline post
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find the new timeline post
        id: find
        run: |
          set -euo pipefail
          # The newest dated *.md file under docs/timeline/. We restrict
          # to four-digit-year prefixes so _TEMPLATE.md (no date) is
          # ignored.
          NEW_FILE=$(git ls-files docs/timeline/ 'docs/timeline/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-*.md' \
            | xargs -I{} stat -f "%m {}" {} 2>/dev/null \
            | sort -rn \
            | head -n1 \
            | awk '{print $2}') || true

          if [ -z "${NEW_FILE:-}" ]; then
            echo "No dated timeline post found in this push; nothing to do."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "file=$NEW_FILE" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename "$NEW_FILE")" >> "$GITHUB_OUTPUT"

      - name: Read frontmatter and create the draft release
        if: steps.find.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FILE="${{ steps.find.outputs.file }}"
          FILENAME="${{ steps.find.outputs.filename }}"

          # Parse simple YAML frontmatter. We only need the first
          # `title:` and `version:` lines.
          FRONTMATTER=$(awk '/^---$/{c++; next} c==2{exit} c==1' "$FILE")
          TITLE=$(printf '%s\n' "$FRONTMATTER" | awk -F': *' '/^title:/{sub(/^title: */,""); print; exit}')
          VERSION=$(printf '%s\n' "$FRONTMATTER" | awk -F': *' '/^version:/{sub(/^version: */,""); print; exit}')

          if [ -z "${TITLE:-}" ]; then
            # Fall back to the filename, humanised.
            TITLE=$(basename "$FILE" .md | sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}-//; s/-/ /g')
          fi
          if [ -z "${VERSION:-}" ]; then
            echo "::error::No 'version:' in frontmatter of $FILE"
            exit 1
          fi

          # Don't recreate a release that already exists.
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; skipping."
            exit 0
          fi

          echo "Creating draft release $VERSION ($TITLE) from $FILE"
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --notes-file "$FILE" \
            --target "$GITHUB_SHA" \
            --draft

          echo "Draft release $VERSION created. Review and publish from:"
          echo "  https://github.com/$GITHUB_REPOSITORY/releases/tag/$VERSION"
