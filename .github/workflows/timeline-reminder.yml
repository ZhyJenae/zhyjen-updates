name: Weekly timeline-post nudge

# Posts a "time to write a timeline post?" issue every Monday at
# 09:00 UTC. The issue is auto-closed if a new dated timeline post
# has landed in the past 14 days, so this is a quiet reminder rather
# than a recurring nag.
#
# The nudge is the same shape every week; the value is in the
# auto-close, which keeps the issue list clean for non-maintainers.

on:
  schedule:
    # Every Monday at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  nudge:
    name: Open (or skip) the weekly nudge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for a recent timeline post
        id: recent
        run: |
          set -euo pipefail
          # The most recently authored dated timeline post (by
          # mtime, not by git history).
          LATEST=$(find docs/timeline -maxdepth 1 -type f \
                   -regex '.*/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-.*\.md' \
                   -printf '%T@\t%p\n' 2>/dev/null \
                   | sort -rn \
                   | head -n1 \
                   | cut -f2- || true)
          if [ -z "${LATEST:-}" ]; then
            echo "No timeline post found yet."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Days since the latest post.
          LATEST_MTIME=$(stat -c %Y "$LATEST" 2>/dev/null || stat -f %m "$LATEST")
          NOW=$(date +%s)
          DAYS_SINCE=$(( (NOW - LATEST_MTIME) / 86400 ))
          echo "Latest timeline post: $LATEST ($DAYS_SINCE days old)"
          if [ "$DAYS_SINCE" -lt 14 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open the weekly nudge issue
        if: steps.recent.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const body = `## Time to write a timeline post?

It's been a while since the last one. The cadence we're aiming for is roughly
**once every 1–2 weeks** when there's user-visible work to talk about.

### How

1. Copy \`docs/timeline/_TEMPLATE.md\` to
   \`docs/timeline/${today}-vX-Y-Z-short-slug.md\`.
2. Fill in the frontmatter and the sections.
3. Open a PR. The \`.github/workflows/timeline-release.yml\` action will
   create a draft release from the new file. Review and publish.
4. After the release is published, drop a short "What's new" post
   in the [Announcements](https://github.com/${context.repo.owner}/${context.repo.repo}/discussions/categories/announcements) discussion category
   so the watchers get notified.

### Skip

If there's nothing user-visible to talk about this week, just close
this issue with a short reason ("no shipping", "internal-only",
"bumped to next week") and the next Monday's run will open a new one.
`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📅 Weekly timeline-post nudge (${today})`,
              body,
              labels: ["maintenance"],
            });
